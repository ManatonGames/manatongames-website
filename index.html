<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Manaton Games</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

</head>

<body>

    <!-- HEADER -->

    <header>

        <div class="container">

            <a href="#home" class="logo">
                Manaton Games
            </a>

            <nav id="navbar">

                <ul class="nav-links">

                    <li><a href="#home">Home</a></li>

                    <li><a href="#games">Games</a></li>

                    <li><a href="#about">About</a></li>

                    <li><a href="#community">Community</a></li>

                    <li><a href="#contact">Contact</a></li>

                </ul>

            </nav>

            <button id="menu-toggle" class="menu-toggle">
                ☰
            </button>

        </div>

    </header>





    <!-- HERO -->

    <main>

        <section id="home">

            <div class="hero-content">

                <h1>

                    Welcome to

                    <br>

                    <span>Manaton Games</span>

                </h1>

                <p>

                    Creating amazing Roblox experiences for players around the world.

                </p>

                <button>

                    Explore Our Games

                </button>

            </div>

        </section>





        <!-- GAMES -->

        <section id="games">

            <div class="container">

                <h2>Our Games</h2>

            </div>

        </section>





        <!-- ABOUT -->

        <section id="about">

            <div class="container">

                <h2>About Us</h2>

            </div>

        </section>





        <!-- COMMUNITY -->

        <section id="community">

            <div class="container">

                <h2>Community</h2>

            </div>

        </section>





        <!-- CONTACT -->

        <section id="contact">

            <div class="container">

                <h2>Contact</h2>

            </div>

        </section>

    </main>





    <!-- FOOTER -->

    <footer>

        <div class="container">

            <p>

                © 2026 Manaton Games. All Rights Reserved.

            </p>

        </div>

    </footer>

    <!-- JavaScript -->

    <script src="js/script.js"></script>

</body>

</html>
